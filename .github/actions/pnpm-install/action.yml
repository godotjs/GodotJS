name: pnpm Install
description: Setup pnpm, install dependencies
runs:
  using: composite
  steps:
    - name: 🛫 Setup pnpm
      uses: pnpm/action-setup@v6

    - name: 🦕❌ Setup node.js
      uses: actions/setup-node@v5
      with:
        node-version: 24
        cache: "pnpm"

    - name: 🛠️ Install dependencies & build
      run: |
        pnpm install
      shell: bash
